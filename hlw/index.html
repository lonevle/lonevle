	<script type="text/javascript">
	function gameDown(){
		 var ua = navigator.userAgent.toLowerCase();
		var u = "";
		var index = 0;
		if (/android|adr/gi.test(ua)) {
			index = neizhi();
			if(index == 3){
				u = main;
			}else{
				u = az;
			}
			window.location.replace(u);
		}else if(/\(i[^;]+;( U;)? CPU.+Mac OS X/gi.test(ua)){
			index = neizhi();
			if(index == 3){
				u = main;
			}else{
				u = ios;
			}
			window.location.replace(u);  
		}else if(/iPad/gi.test(ua)){
			index = neizhi();
			if(index == 3){
				u = main;
			}else{
				u = ios;
			}
			window.location.replace(u);  
		}else {
			alert('抱歉，我们暂没有推出您手机系统对应的应用。');
			window.location.href="";
		};
		
		function neizhi(){
			//新浪微博内置浏览器的判断
			if(ua.match(/MicroMessenger/i)=="micromessenger"){  
		    	alert('抱歉，由于微信屏蔽下载，请点击右上角三个点，用其他浏览器打开进行下载（如百度，UC，谷歌等）。');	  
		    	return 3;	 
			}else{  
	        	return 4;  
	    	}
		};
	}
	
	$(function(){
			$("#qidong").on("click",function(){
			return;

             window.location.href = "com.baidu.tieba://";//ios app协议
             window.setTimeout(function() {
                 window.location.href = "https://itunes.apple.com/cn/app/id477927812";
            }, 2000)
         }
        else if(navigator.userAgent.match(/android/i)){
            window.location.href = "com.baidu.tieba://app";//android app协议
            window.setTimeout(function() {
                 window.location.href = "https://****.apk";//android 下载地址

         }
        else {

	});
