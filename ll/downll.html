<script>
    var g_type=is_weixn();
    $(function() {
        var path = "itms-services://?action=download-manifest&url=https://www.3o01.cn/lldzz2.plist";
        if(path=="0"){
            $('#android').css('right','2.3rem');
        }
        var height = $(window).height();
        var width = $(document).width();
        $('body').css('height', height);
        if (isPC()) {
            let marginWidth = (width - 375) / 2;
            $('#pagemain').css({"width":"375px","height":"700px"});
            $('#pagemain').css("margin-left",marginWidth);
            $('#android').hide();
            $('#iosid').hide();
            $('#pc').show();
            $('#pc').bind("click",function(){
                var type = "http://cdndown.tyh456n.cn/lldzz2.exe";
                window.location.href=type;
            });
        }
    });

    if(g_type==false){
        $("#backColor").css('display','none');
        $('#backColor img').css('display','none');

        $('#android').bind("click",function(){
            if( /android/i.test(navigator.userAgent)){
                var type = "http://cdndown.tyh456n.cn/lldzz2.apk";
                if(type!==0){
                    window.location.href=type;
                }else{
                    layer.msg("下载地址有误");
                }
            }
            if(/(iPhone|iPad|iPod|iOS)/i.test(navigator.userAgent)){
                var type = "itms-services://?action=download-manifest&url=https://www.3o01.cn/lldzz2.plist";
                window.location.href=type;
            }
        });


        $('#iosid').bind("click",function(){
            if( /android/i.test(navigator.userAgent)){
                var type = "http://cdndown.tyh456n.cn/lldzz2.apk";
                if(type!==0){
                    window.location.href=type;
                }else{
                    layer.msg("下载地址有误");
                }
            }
            if(/(iPhone|iPad|iPod|iOS)/i.test(navigator.userAgent)){
                var type = "itms-services://?action=download-manifest&url=https://www.3o01.cn/lldzz2.plist";
                window.location.href=type;
            }
        });
    }else{
        $('.btnStyle').bind('click',function(){
            var height=$(window).height();
            $("#backColor").css('display','block');
            $("#backColor").css('height',height);
            $('#backColor img').css('display','block');
        });
    }
    function is_weixn(){
        var ua = navigator.userAgent.toLowerCase();
        if(ua.match(/MicroMessenger/i) == 'micromessenger') {
            return true;
        } else {
            return false;
        }
    }
    function isPC() {
        let isApple = /(iPhone|iPad|iPod|iOS)/i.test(navigator.userAgent);
        let isAndroid = /android/i.test(navigator.userAgent);
        return (!(isApple || isAndroid));
    }

</script>
